name: Deploy React Docker App to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t react-app .

    - name: Save Docker image to tar
      run: |
        docker save react-app | gzip > react-app.tar.gz

    # 100% working version:
    - name: Upload image to EC2
      uses: appleboy/scp-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "react-app.tar.gz"
        target: ${{ secrets.EC2_DIR }}

    # 100% working version:
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ${{ secrets.EC2_DIR }}
          gunzip -f react-app.tar.gz || true
          docker load < react-app.tar
          docker stop react-app || true
          docker rm react-app || true
          docker run -d --name react-app -p 80:80 react-app
          echo 'Deployment successful!'
